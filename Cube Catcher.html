<!DOCTYPE html>
<html>
<head>
    <title>Cube Catcher Game</title>

    <style>
        body{
            margin:0;
            overflow:hidden;
            background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
            font-family:Arial;
        }

        h2{
            text-align:center;
            color:#f8fafc;
            margin-top:15px;
            letter-spacing:2px;
            text-shadow:0 0 10px #38bdf8;
        }

        canvas{
            display:block;
            margin:20px auto;
            background:#e2e8f0;
            border:4px solid #38bdf8;
            border-radius:15px;
            box-shadow:0 0 35px rgba(56,189,248,0.5);
        }
    </style>
</head>

<body>

<h2>CUBE CATCHER</h2>

<canvas id="gameCanvas" width="750" height="500"></canvas>

<script>

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let basket = {
        x:310,
        y:440,
        width:130,
        height:22
    };

    let cube = {
        x:Math.random() * 680,
        y:0,
        size:45,
        speed:4
    };

    let score = 0;

    function drawBasket(){

        ctx.fillStyle = "#0ea5e9";
        ctx.shadowColor = "#38bdf8";
        ctx.shadowBlur = 20;
        ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
    }

    function drawCube(){

        ctx.fillStyle = "#f43f5e";
        ctx.shadowColor = "#fb7185";
        ctx.shadowBlur = 20;
        ctx.fillRect(cube.x, cube.y, cube.size, cube.size);
    }

    function drawScore(){

        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 28px Arial";
        ctx.fillText("Score : " + score, 20, 40);
    }

    function updateGame(){

        ctx.clearRect(0,0,canvas.width,canvas.height);

        cube.y += cube.speed;

        if(
            cube.y + cube.size >= basket.y &&
            cube.x < basket.x + basket.width &&
            cube.x + cube.size > basket.x
        ){

            score++;

            cube.y = 0;
            cube.x = Math.random() * 680;
        }

        if(cube.y > canvas.height){

            cube.y = 0;
            cube.x = Math.random() * 680;
        }

        drawBasket();
        drawCube();
        drawScore();

        requestAnimationFrame(updateGame);
    }

    document.addEventListener("keydown", function(e){

        if(e.key === "ArrowLeft" && basket.x > 0){

            basket.x -= 30;
        }

        if(e.key === "ArrowRight" && basket.x < canvas.width - basket.width){

            basket.x += 30;
        }
    });

    updateGame();

</script>

</body>
</html>
