<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Object</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
            overflow:hidden;
        }

        .container{
            text-align:center;
        }

        h1{
            color:white;
            margin-bottom:20px;
            letter-spacing:2px;
            text-shadow:0 0 15px #38bdf8;
        }

        canvas{
            background:#f8fafc;
            border:4px solid #38bdf8;
            border-radius:20px;
            box-shadow:0 0 35px rgba(56,189,248,0.6);
        }

        p{
            color:#cbd5e1;
            margin-top:15px;
            font-size:18px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Interactive Object Movement</h1>

        <canvas id="gameCanvas" width="800" height="450"></canvas>

        <p>Use Arrow Keys or W A S D Keys to Move</p>

    </div>

    <script>

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const player = {
            x: 350,
            y: 180,
            size: 70,
            speed: 5
        };

        const keys = {};

        window.addEventListener("keydown", (e) => {
            keys[e.key] = true;
        });

        window.addEventListener("keyup", (e) => {
            keys[e.key] = false;
        });

        function update() {

            if (keys["ArrowUp"] || keys["w"]) {
                player.y -= player.speed;
            }

            if (keys["ArrowDown"] || keys["s"]) {
                player.y += player.speed;
            }

            if (keys["ArrowLeft"] || keys["a"]) {
                player.x -= player.speed;
            }

            if (keys["ArrowRight"] || keys["d"]) {
                player.x += player.speed;
            }

            if(player.x < 0){
                player.x = 0;
            }

            if(player.y < 0){
                player.y = 0;
            }

            if(player.x + player.size > canvas.width){
                player.x = canvas.width - player.size;
            }

            if(player.y + player.size > canvas.height){
                player.y = canvas.height - player.size;
            }
        }

        function drawCube(){

            ctx.fillStyle = "#2563eb";
            ctx.fillRect(player.x, player.y, player.size, player.size);

            ctx.fillStyle = "#60a5fa";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + 20, player.y - 20);
            ctx.lineTo(player.x + player.size + 20, player.y - 20);
            ctx.lineTo(player.x + player.size, player.y);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = "#1d4ed8";
            ctx.beginPath();
            ctx.moveTo(player.x + player.size, player.y);
            ctx.lineTo(player.x + player.size + 20, player.y - 20);
            ctx.lineTo(player.x + player.size + 20, player.y + player.size - 20);
            ctx.lineTo(player.x + player.size, player.y + player.size);
            ctx.closePath();
            ctx.fill();

            ctx.shadowColor = "#38bdf8";
            ctx.shadowBlur = 20;
        }

        function render(){

            ctx.clearRect(0,0,canvas.width,canvas.height);

            update();

            drawCube();

            requestAnimationFrame(render);
        }

        render();

    </script>

</body>
</html>
